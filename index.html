<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Update Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .record-btn {
            transition: all 0.3s ease;
            touch-action: manipulation;
        }
        .recording {
            animation: pulse 1.5s infinite;
            background-color: #ef4444 !important;
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900">

    <nav class="fixed bottom-0 w-full bg-white border-t border-gray-200 flex justify-around py-4 z-50">
        <button onclick="showTab('home')" class="flex flex-col items-center text-blue-600">
            <span class="text-xs font-bold">RECORD</span>
        </button>
        <button onclick="showTab('records')" class="flex flex-col items-center text-gray-500">
            <span class="text-xs font-bold">RECORDS</span>
        </button>
    </nav>

    <main id="home-tab" class="p-6 pb-24">
        <header class="mb-8">
            <h1 id="current-date" class="text-3xl font-bold text-gray-800"></h1>
            <p id="current-time" class="text-xl text-gray-500"></p>
        </header>

        <section class="space-y-6">
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-2 uppercase tracking-wide">Doctor / Nurse Name</label>
                <input type="text" id="doc-name" placeholder="Who is speaking?" 
                    class="w-full p-4 text-lg border-2 border-gray-200 rounded-xl focus:border-blue-500 outline-none transition-colors">
            </div>

            <div class="flex flex-col items-center justify-center py-12">
                <button id="record-btn" onclick="toggleRecording()" 
                    class="record-btn w-48 h-48 rounded-full bg-blue-600 text-white shadow-2xl flex flex-col items-center justify-center border-8 border-white">
                    <span id="btn-icon" class="text-4xl mb-2">●</span>
                    <span id="btn-text" class="text-lg font-bold">START</span>
                </button>
                <p id="status-msg" class="mt-6 text-gray-500 font-medium italic">Ready to record notes...</p>
            </div>

            <div id="live-transcript" class="p-4 bg-blue-50 border border-blue-100 rounded-xl hidden">
                <p class="text-sm text-blue-800 italic">Live Transcript: <span id="transcript-text" class="text-gray-700 not-italic"></span></p>
            </div>
        </section>
    </main>

    <main id="records-tab" class="p-6 pb-24 hidden">
        <h2 class="text-2xl font-bold mb-6">Saved Records</h2>
        <div id="records-list" class="space-y-4">
            </div>
    </main>

    <script>
        // Update clock every second
        function updateClock() {
            const now = new Date();
            document.getElementById('current-date').innerText = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
            document.getElementById('current-time').innerText = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Tab Management
        function showTab(tab) {
            document.getElementById('home-tab').classList.toggle('hidden', tab !== 'home');
            document.getElementById('records-tab').classList.toggle('hidden', tab !== 'records');
            if (tab === 'records') loadRecords();
        }

        // Speech Recognition Setup
        const recordBtn = document.getElementById('record-btn');
        const btnText = document.getElementById('btn-text');
        const statusMsg = document.getElementById('status-msg');
        const liveTranscript = document.getElementById('live-transcript');
        const transcriptText = document.getElementById('transcript-text');

        let isRecording = false;
        let recognition;
        let finalTranscript = "";

        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onresult = (event) => {
                let interim = "";
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    } else {
                        interim += event.results[i][0].transcript;
                    }
                }
                transcriptText.innerText = finalTranscript + interim;
            };

            recognition.onerror = (event) => {
                console.error(event.error);
                stopRecordingManually();
            };
        }

        function toggleRecording() {
            if (!isRecording) {
                startRecording();
            } else {
                stopRecording();
            }
        }

        function startRecording() {
            finalTranscript = "";
            transcriptText.innerText = "";
            isRecording = true;
            recordBtn.classList.add('recording');
            btnText.innerText = "STOP";
            statusMsg.innerText = "Listening to doctors' notes...";
            liveTranscript.classList.remove('hidden');
            recognition.start();
        }

        function stopRecording() {
            recognition.stop();
            saveRecord();
            stopRecordingUI();
        }

        function stopRecordingUI() {
            isRecording = false;
            recordBtn.classList.remove('recording');
            btnText.innerText = "START";
            statusMsg.innerText = "Note saved successfully.";
            setTimeout(() => { liveTranscript.classList.add('hidden'); }, 3000);
        }

        function saveRecord() {
            const docName = document.getElementById('doc-name').value || "Unknown Staff";
            const newRecord = {
                id: Date.now(),
                date: new Date().toLocaleDateString(),
                time: new Date().toLocaleTimeString(),
                doctor: docName,
                text: finalTranscript
            };

            const records = JSON.parse(localStorage.getItem('icu_notes') || "[]");
            records.unshift(newRecord);
            localStorage.setItem('icu_notes', JSON.stringify(records));
            document.getElementById('doc-name').value = ""; // Reset name
        }

        function loadRecords() {
            const container = document.getElementById('records-list');
            const records = JSON.parse(localStorage.getItem('icu_notes') || "[]");
            
            if (records.length === 0) {
                container.innerHTML = `<p class="text-gray-400 text-center py-12">No records yet.</p>`;
                return;
            }

            container.innerHTML = records.map(r => `
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <h3 class="font-bold text-gray-800">${r.doctor}</h3>
                            <p class="text-xs text-gray-400">${r.date} at ${r.time}</p>
                        </div>
                    </div>
                    <p class="text-gray-600 text-sm leading-relaxed">${r.text || "No speech detected."}</p>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
